const CARD_PREFIX = "TOMO1:";

// にほんごも あつかえる Base64
// ★ URLセーフ版（+ / = を つかわない）→ LINEや メールで こわれにくい
function toB64(str) {
  const b = btoa(unescape(encodeURIComponent(str)));
  return b.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
function fromB64(b64) {
  // - _ を もどす／おわりの = を おぎなう
  let t = b64.replace(/-/g, "+").replace(/_/g, "/");
  while (t.length % 4 !== 0) t += "=";
  return decodeURIComponent(escape(atob(t)));
}

// じゅうみん → カード（もじれつ）
function encodeCard(r) {
  const data = {
    n: r.name,
    p: r.personality,
    a: r.avatar,
    v: r.voiceSeed ?? 3,
    g: Math.floor(r.age ?? 22),
    s: r.schoolLevel ?? 6,
    f: r.favFood,
    w: r.windowColor,
    l: r.level ?? 1,
  };
  return CARD_PREFIX + toB64(JSON.stringify(data));
}

// ★ カードの もじれつを きれいに する（コピペの ゴミを とりのぞく）★
function cleanCardText(text) {
  let t = String(text || "");
  // ぜんかく→はんかく、みえない もじを けす
  try { t = t.normalize("NFKC"); } catch (e) {}
  t = t.replace(/[\u200B-\u200D\uFEFF]/g, ""); // ゼロはばスペース
  t = t.replace(/[「」『』"'<>（）()\[\]]/g, "");   // かっこ・いんようふ
  t = t.replace(/\s+/g, "");                      // かいぎょう・スペース ぜんぶ
  return t;
}

// カード → じゅうみん
function decodeCard(text, spot) {
  const raw = String(text || "");
  if (!raw.trim()) throw new Error("カードが からっぽだよ");

  let t = cleanCardText(raw);

  // ★ TOMO1: を どこに あっても みつける（おおもじ・こもじ どっちでも）★
  const idx = t.toUpperCase().indexOf("TOMO1:");
  let body;
  if (idx >= 0) {
    body = t.slice(idx + 6);
  } else {
    // プレフィックスが きえてても、Base64っぽければ よんでみる
    body = t;
  }

  // Base64で つかう もじ だけ のこす
  body = body.replace(/[^A-Za-z0-9+/=_-]/g, "");
  if (!body) throw new Error("カードの なかみが みつからないよ");

  let d;
  try {
    d = JSON.parse(fromB64(body));
  } catch (e) {
    throw new Error("カードが よめなかった…もういちど ぜんぶ コピーしてね");
  }
  if (!d || !d.n || !d.a) throw new Error("カードが こわれてるみたい");
  return {
    id: "r" + Date.now() + rand(9999),
    name: String(d.n).slice(0, 8),
    personality: PERSONALITIES.some((x) => x.id === d.p) ? d.p : "genki",
    avatar: {
      skin: clamp(d.a.skin | 0, 0, SKIN_COLORS.length - 1),
      hairStyle: clamp(d.a.hairStyle | 0, 0, HAIR_STYLES - 1),
      hairColor: clamp(d.a.hairColor | 0, 0, HAIR_COLORS.length - 1),
      bangs: clamp(d.a.bangs | 0, 0, BANG_STYLES - 1),
      eyes: clamp(d.a.eyes | 0, 0, EYE_STYLES - 1),
      mouth: clamp(d.a.mouth | 0, 0, MOUTH_STYLES - 1),
      shirt: clamp(d.a.shirt | 0, 0, SHIRT_COLORS.length - 1),
    },
    voiceSeed: clamp(d.v | 0, 0, VOICE_TWEAKS.length - 1),
    age: clamp(d.g | 0, 0, 60),
    schoolLevel: clamp(d.s | 0, 0, 6),
    hunger: 75,
    happiness: 85,
    level: clamp(d.l | 0, 1, 99),
    exp: 0,
    favFood: FOODS.some((f) => f.id === d.f) ? d.f : pick(FOODS).id,
    favKnown: false,
    windowColor: clamp(d.w | 0, 0, WINDOW_COLORS.length - 1),
    problem: null,
    partnerId: null,
    married: false,
    isBaby: (d.g | 0) < 3,
    growth: 100,
    parents: null,
    babyCooldown: 0,
    homeSpot: spot,
    fromOtherIsland: true,   // ★ よその しまから きた しるし
  };
}

// ブラウザの にほんごの こえを あつめる
let jaVoices = [];
function refreshVoices() {
  if (typeof window === "undefined" || !window.speechSynthesis) return;
  const all = window.speechSynthesis.getVoices() || [];
  jaVoices = all.filter((v) => (v.lang || "").toLowerCase().startsWith("ja"));
}
if (typeof window !== "undefined" && window.speechSynthesis) {
  refreshVoices();
  window.speechSynthesis.onvoiceschanged = refreshVoices;
}

function speakAs(r, text, opts) {
  if (!soundEnabled) return;
  if (typeof window === "undefined" || !window.speechSynthesis) return;
  opts = opts || {};
  const base = VOICE[r.personality] || VOICE.shikkari;
  const tw = VOICE_TWEAKS[(r.voiceSeed ?? 3) % VOICE_TWEAKS.length];

  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ja-JP";

  // あかちゃんは とても たかい こえ
  const babyBoost = r.isBaby ? 0.55 : 0;

  u.pitch = clamp((opts.pitch != null ? opts.pitch : base.pitch) + tw.p + babyBoost, 0, 2);
  u.rate  = clamp((opts.rate  != null ? opts.rate  : base.rate)  + tw.r, 0.1, 3);
  u.volume = base.volume;

  // にほんごの こえが 2つ いじょう あれば、じゅうみんごとに かえる
  if (jaVoices.length > 0) {
    u.voice = jaVoices[(r.voiceSeed ?? 3) % jaVoices.length];
  }
  window.speechSynthesis.speak(u);
}

function stopSpeaking() {
  if (typeof window !== "undefined" && window.speechSynthesis) window.speechSynthesis.cancel();
}

// いろに かげを つけて まるく みせる
function shade(hex, amt) {
  const h = hex.replace("#", "");
  const n = parseInt(h.length === 3 ? h.split("").map((c) => c + c).join("") : h, 16);
  let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  r = clamp(Math.round(r + amt), 0, 255);
  g = clamp(Math.round(g + amt), 0, 255);
  b = clamp(Math.round(b + amt), 0, 255);
  return "#" + [r, g, b].map((v) => v.toString(16).padStart(2, "0")).join("");
}

  );
}

  const [day, setDay] = useState(0);               // しまの ひにち
  const [visitor, setVisitor] = useState(null);    // いま きてる たびびと
  const [activeEvent, setActiveEvent] = useState(null); // かいさいちゅうの イベント
  const [photos, setPhotos] = useState([]);        // しゃしんアルバム
  const [houseSpot, setHouseSpot] = useState(null); // ひらいてる いえ
  const [cardOut, setCardOut] = useState("");      // おくる カード
  const [cardIn, setCardIn] = useState("");        // うけとった カード
  const [cardErr, setCardErr] = useState("");     // カードの エラー
  const toastTimer = useRef(null);
  const prevUnlocked = useRef(0);

  // 🔊 のON/OFFを speak() がわに つたえる
  useEffect(() => {
    soundEnabled = soundOn;
    if (!soundOn) stopSpeaking();
  }, [soundOn]);

  const showToast = useCallback((text) => {
    setToast(text);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2600);
  }, []);

  const addLog = useCallback((text) => {
    setLog((l) => [{ text, t: Date.now() }, ...l].slice(0, 40));
  }, []);

  // ---- セーブ/ロード ----
  useEffect(() => {
    (async () => {
      try {
        const res = await gameStorage.get(SAVE_KEY);
        if (res && res.value) {
          const d = JSON.parse(res.value);
          setCoins(d.coins ?? 150);
          setResidents(d.residents ?? []);
          setRelations(d.relations ?? {});
          setLog(d.log ?? []);
          setObjects(d.objects ?? []);
          setTravelers(d.travelers ?? []);
          setDay(d.day ?? 0);
          setPhotos(d.photos ?? []);
          if (typeof d.soundOn === "boolean") setSoundOn(d.soundOn);
        }
      } catch (e) {
        // セーブデータなし（初回起動）
      }
      setLoaded(true);
    })();
  }, []);

  // ★セーブ本体（silent=trueなら だまって ほぞん）
  const saveNow = useCallback(async (silent) => {
    try {
      await gameStorage.set(SAVE_KEY, JSON.stringify({ coins, residents, relations, log, objects, soundOn, travelers, day, photos }));
      setLastSaved(Date.now());
      if (!silent) showToast("💾 セーブしたよ！ また あとで つづきから あそべる");
    } catch (e) {
      if (!silent) showToast("セーブ できなかった…もういちど ためしてね");
    }
  }, [coins, residents, relations, log, objects, soundOn, travelers, day, photos, showToast]);

  // じどうセーブ（なにか かわったら 0.8びょうご）
  useEffect(() => {
    if (!loaded) return;
    const timer = setTimeout(() => { saveNow(true); }, 800);
    return () => clearTimeout(timer);
  }, [coins, residents, relations, log, objects, soundOn, travelers, day, photos, loaded, saveNow]);

  // ---- 時間経過 ----
  useEffect(() => {
    if (!loaded) return;
    const iv = setInterval(() => {
      setResidents((rs) => {
        if (rs.length === 0) return rs;
        const next = rs.map((r) => ({
          ...r,
          hunger: clamp(r.hunger - 2, 0, 100),
          happiness: clamp(r.happiness - (r.hunger < 25 ? 2 : 0.5), 0, 100),

      partnerId: null, married: false,
      isBaby: false, growth: 100, parents: null, babyCooldown: 0,
      homeSpot: spot,
    };
    setResidents((rs) => [...rs, nr]);
    setVisitor(null);
    stopSpeaking();
    speakAs(nr, "この しまに すむよ！ よろしくね！");
    addLog(`🏠 ${nr.name}が しまの じゅうみんに なった！`);
    showToast(`🏠 ${nr.name}が ひっこして きた！`);
  };

  // ★★ じゅうみんカードを つくる（おくる）★★
  const makeCard = (id) => {
    const r = residents.find((x) => x.id === id);
    if (!r) return;
    const code = encodeCard(r);
    setCardOut(code);
    addLog(`📮 ${r.name}の じゅうみんカードを つくった！`);
    showToast(`📮 ${r.name}の カードが できた！ コピーして おくろう`);
  };

  const copyCard = async () => {
    if (!cardOut) return;
    try {
      await navigator.clipboard.writeText(cardOut);
      showToast("📋 コピーしたよ！ LINEなどで おくってね");
      return;
    } catch (e) {
      // file:// では つかえない ことが あるので したの ほうほうで
    }
    try {
      const ta = document.getElementById("cardOutArea");
      if (ta) {
        ta.select();
        ta.setSelectionRange(0, 99999);
        document.execCommand("copy");
        showToast("📋 コピーしたよ！ LINEなどで おくってね");
      }
    } catch (e2) {
      showToast("じぶんで えらんで コピーしてね（Ctrl+C）");
    }
  };

  // ★★ しまごと バックアップ（ファイルに かきだす）★★
  const exportIsland = () => {
    const data = { coins, residents, relations, log, objects, soundOn, travelers, day, photos, savedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const d = new Date();
    a.href = url;
    a.download = `ともだちアイランド_${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}.json`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    addLog("🗂️ しまの バックアップを かきだした！");
    showToast("🗂️ バックアップを ほぞんしたよ！");
  };

  // ★★ バックアップから しまを もどす ★★
  const importIsland = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const d = JSON.parse(reader.result);
        if (!d || !Array.isArray(d.residents)) throw new Error("bad");
        if (!window.confirm("いまの しまは きえて、バックアップの しまに もどります。いい？")) return;
        setCoins(d.coins ?? 150);
        setResidents(d.residents ?? []);
        setRelations(d.relations ?? {});
        setLog(d.log ?? []);
        setObjects(d.objects ?? []);
        setTravelers(d.travelers ?? []);
        setDay(d.day ?? 0);
        setPhotos(d.photos ?? []);
        if (typeof d.soundOn === "boolean") setSoundOn(d.soundOn);
        showToast("🗂️ しまが もどったよ！ おかえり！");
        addLog("🗂️ バックアップから しまを ふっかつさせた！");
      } catch (e) {
        showToast("❌ バックアップファイルが よめなかった…");
      }
    };
    reader.readAsText(file);
  };

  // ★ クリップボードから はりつける ★
  const pasteCard = async () => {
    try {
      const t = await navigator.clipboard.readText();
      if (t) { setCardIn(t); setCardErr(""); showToast("📋 はりつけたよ！ ボタンを おしてね"); }
      else showToast("クリップボードが からっぽ だよ");
    } catch (e) {
      showToast("じぶんで はりつけてね（Ctrl+V）");
    }
  };

  // ★★ カードを うけとる（じゅうみんが ひっこして くる）★★
  const receiveCard = () => {
    setCardErr("");
    if (!cardIn.trim()) { showToast("カードを はりつけてね！"); return; }
    if (residents.length >= MAX_RESIDENTS) {
      showToast(`いえが いっぱい！（${MAX_RESIDENTS}にん）たびに おくりだそう ⛴️`);
      return;
    }
    let nr;
    try {
      const used = new Set(residents.map((r) => r.homeSpot));
      let spot = 0;
      for (let i = 0; i < HOME_SPOTS.length; i++) { if (!used.has(i)) { spot = i; break; } }
      nr = decodeCard(cardIn, spot);
    } catch (e) {
      const msg = e.message || "カードが よめなかった";
      // ★ なにが はりつけられたか みせる（げんいんが わかるように）★
      const peek = String(cardIn).trim().slice(0, 40);
      setCardErr(`${msg}\n\n【はりつけられた もじ】\n${peek}${cardIn.length > 40 ? "…" : ""}\n（ぜんぶで ${cardIn.length}もじ）`);
      showToast(`❌ ${msg}`);
      return;
    }
    // おなじ なまえが いたら すこし かえる
    if (residents.some((r) => r.name === nr.name)) {
      nr.name = (nr.name + "2").slice(0, 8);
    }
    setResidents((rs) => [...rs, nr]);
    setCardIn("");
    setCardErr("");
    stopSpeaking();
    speakAs(nr, "はじめまして！ よその しまから きました！");
    addLog(`🌏 よその しまから ${nr.name}が やってきた！ なかまに なったよ`);
    showToast(`🌏 ${nr.name}が しまに ひっこして きた！`);
  };

  // ★ しまに オブジェを おく ★
  const placeObject = (x, y) => {
    if (objects.length >= 40) { showToast("これいじょう おけないよ！（40こまで）"); return; }
    setObjects((o) => [...o, { id: "o" + Date.now() + rand(999), emoji: brush, x, y }]);
  };
  const removeObject = (id) => {
    setObjects((o) => o.filter((x) => x.id !== id));
  };

  const introduce = () => {
    if (!selected || selected.problem?.type !== "friend") return;
    const target = residents.find((r) => r.id === selected.problem.targetId);
    if (!target) { updateResident(selected.id, (r) => ({ ...r, problem: null })); return; }
    setRelations((rel) => {
      const k = pairKey(selected.id, target.id);
      return { ...rel, [k]: clamp((rel[k] || 0) + 25, 0, 100) };
    });
    updateResident(selected.id, (r) => ({ ...r, problem: null, happiness: clamp(r.happiness + 15, 0, 100) }));
    setCoins((c) => c + 30);
    showToast(`しょうかい せいこう！ +30コイン 🪙`);
    addLog(`🤝 ${selected.name}を ${target.name}に しょうかいした`);
    setBubble({ id: selected.id, text: `${target.name}、いいひとだね！` });
    gainExp(selected.id, 20);
  };

  // ---- 施設アクション ----
  const workAtShop = () => {
    if (!workReady) return;
    const earn = 12 + rand(14);
    setCoins((c) => c + earn);
    setWorkReady(false);
    showToast(`おてつだい かんりょう！ +${earn}コイン 🪙`);
    addLog(`🏪 ショップで アルバイトした（+${earn}）`);
    setTimeout(() => setWorkReady(true), 25000);
  };

  const cafeRest = (id) => {
    const r = residents.find((x) => x.id === id);
    if (!r) return;
    if (coins < 20) { showToast("コインが たりない！"); return; }
    setCoins((c) => c - 20);
    updateResident(id, (x) => ({ ...x, happiness: clamp(x.happiness + 25, 0, 100), hunger: clamp(x.hunger + 10, 0, 100) }));
    showToast(`${r.name}が カフェで ひとやすみ ☕`);
    addLog(`☕ ${r.name}が カフェで リラックスした`);
    gainExp(id, 8);
  };

  const libraryStudy = (id) => {
    const r = residents.find((x) => x.id === id);
    if (!r) return;
    if (coins < 15) { showToast("コインが たりない！"); return; }
    setCoins((c) => c - 15);
    showToast(`${r.name}が べんきょうした 📚`);
    addLog(`📚 ${r.name}が としょかんで まなんだ`);
    gainExp(id, 30);
  };

  const plazaParty = () => {
    if (residents.length === 0) { showToast("じゅうみんが いないよ！"); return; }
    if (coins < 30) { showToast("コインが たりない！（30ひつよう）"); return; }
    setCoins((c) => c - 30);
    setResidents((rs) => rs.map((r) => ({ ...r, happiness: clamp(r.happiness + 20, 0, 100) })));
    // みんなの なかよし度アップ
    setRelations((rel) => {
      const n = { ...rel };
      for (let i = 0; i < residents.length; i++) {
        for (let j = i + 1; j < residents.length; j++) {
          const k = pairKey(residents[i].id, residents[j].id);
          n[k] = clamp((n[k] || 0) + 6, 0, 100);
        }
      }
      return n;
    });
    showToast("ひろばで パーティー！みんな ごきげん 🎉");
    addLog("⛲ ひろばで みんなで あそんだ！なかよし度アップ");
  };

  // ---- 住民の関係リスト ----
  const friendsOf = (id) =>
    residents
      .filter((r) => r.id !== id)
      .map((r) => ({ r, v: relations[pairKey(id, r.id)] || 0 }))
      .filter((x) => x.v > 0)
      .sort((a, b) => b.v - a.v);

  // ============ レンダリング ============
  return (
    <div style={{
      minHeight: "100vh",
      fontFamily: "'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', 'M PLUS Rounded 1c', sans-serif",
      background: "linear-gradient(180deg, #9ED8F0 0%, #C4E9F7 45%, #BDE6A8 45%, #A8D98F 100%)",
      color: "#4A4238",
      paddingBottom: 40,
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap');
        .tomo-bounce { animation: tomoBounce 2.2s ease-in-out infinite; }
        @keyframes tomoBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        .tomo-pop { animation: tomoPop 0.25s ease-out; }
        @keyframes tomoPop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .tomo-alert { animation: tomoAlert 1s ease-in-out infinite; }
        @keyframes tomoAlert { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-3px) scale(1.1); } }
        .tomo-cloud { animation: tomoCloud 40s linear infinite; }
        @keyframes tomoCloud { from { transform: translateX(-120px); } to { transform: translateX(110vw); } }
        @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
        button:focus-visible { outline: 3px solid #FF8FA3; outline-offset: 2px; }
      `}</style>

      {/* 雲 */}
      <div style={{ position: "absolute", top: 30, left: 0, right: 0, overflow: "hidden", height: 60, pointerEvents: "none" }}>
        <div className="tomo-cloud" style={{ fontSize: 40, opacity: 0.9 }}>☁️</div>
      </div>

      {/* ヘッダー */}
      <header style={{ maxWidth: 480, margin: "0 auto", padding: "16px 16px 8px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <h1 style={{ fontSize: 22, fontWeight: 900, margin: 0, textShadow: "0 2px 0 rgba(255,255,255,0.7)" }}>
          🏝️ ともだちアイランド
        </h1>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ background: "#FFFDF5", border: "3px solid #4A4238", borderRadius: 20, padding: "5px 12px", fontWeight: 900, fontSize: 15, boxShadow: "0 3px 0 #4A4238" }}>
            🪙 {coins}
          </div>
          <button
            onClick={() => setSoundOn((v) => !v)}
            aria-label={soundOn ? "おとを けす" : "おとを だす"}
            style={{
              fontFamily: "inherit", fontWeight: 900, fontSize: 15,
              background: soundOn ? "#FFD666" : "#DDD5C8",
              border: "3px solid #4A4238", borderRadius: 20,
              padding: "5px 10px", cursor: "pointer", color: "#4A4238",
              boxShadow: "0 3px 0 #4A4238",
            }}
          >
            {soundOn ? "🔊" : "🔇"}
          </button>
          <button
            onClick={() => saveNow(false)}
            aria-label="セーブする"
            style={{
              fontFamily: "inherit", fontWeight: 900, fontSize: 14,
              background: "#9BE3B0", border: "3px solid #4A4238", borderRadius: 20,
              padding: "5px 12px", cursor: "pointer", color: "#4A4238",
              boxShadow: "0 3px 0 #4A4238",
            }}
          >
            💾 セーブ
          </button>
        </div>
      </header>

      {/* さいごに セーブした じかん */}
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "0 16px", textAlign: "right", fontSize: 11, fontWeight: 700, color: "#41695E" }}>
        {lastSaved
          ? `✅ ほぞん ずみ（${new Date(lastSaved).getHours()}:${String(new Date(lastSaved).getMinutes()).padStart(2, "0")}）`
          : "・・・"}
      </div>

      <main style={{ maxWidth: 480, margin: "0 auto", padding: "8px 16px" }}>
        {/* 画面きりかえ */}
        <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
          <ChunkyButton small color={view === "island" ? "#FFD666" : "#FFFDF5"} onClick={() => { setView("island"); }}>
            🏝️ しま
          </ChunkyButton>
          <ChunkyButton small color={view === "home" ? "#FFD666" : "#FFFDF5"} onClick={() => { setView("home"); setEditMode(false); }}>
            🏠 マンション
          </ChunkyButton>
          {view === "island" && (
            <ChunkyButton small color={editMode ? "#C7B8F5" : "#FFFDF5"} onClick={() => setEditMode((v) => !v)}>
              {editMode ? "✅ かざり おわり" : "🎨 かざる"}
            </ChunkyButton>
          )}
        </div>

        {/* ★ かざるモードの パレット ★ */}
        {view === "island" && editMode && (
          <div className="tomo-pop" style={{
            background: "#FFFDF5", border: "3px solid #4A4238", borderRadius: 16,
            padding: 10, marginBottom: 10, boxShadow: "0 4px 0 #4A4238",
          }}>
            <div style={{ fontSize: 12, fontWeight: 900, marginBottom: 6 }}>
              🎨 おきたい ものを えらんで、しまを タップしてね（けすときは その ものを タップ）
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(10, 1fr)", gap: 4 }}>
              {OBJECT_PALETTE.map((em) => (
                <button
                  key={em}
                  onClick={() => setBrush(em)}
                  style={{
                    fontFamily: "inherit", fontSize: 19, lineHeight: 1,
                    padding: "5px 0", cursor: "pointer",
                    border: brush === em ? "3px solid #4A4238" : "2px solid #E0D6C6",
                    borderRadius: 10,
                    background: brush === em ? "#FFD666" : "#FFFDF5",
                  }}
                >
                  {em}
                </button>
              ))}
            </div>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#8A7E6E", marginTop: 6, textAlign: "right" }}>
              おいた かず: {objects.length} / 40
            </div>
          </div>
        )}

        {/* ★ きせつ ★ */}
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          background: "#FFFDF5", border: "3px solid #4A4238", borderRadius: 14,
          padding: "5px 12px", marginBottom: 10, boxShadow: "0 3px 0 #4A4238",
        }}>
          <span style={{ fontSize: 13, fontWeight: 900 }}>
            {season.emoji} {season.label} ／ しまの {day}にちめ
          </span>
          <span style={{ fontSize: 11, fontWeight: 700, color: "#8A7E6E" }}>
            📷 しゃしん {photos.length}まい
          </span>
        </div>

        {/* ★★ イベント バナー ★★ */}
        {activeEvent && (
          <div className="tomo-pop" style={{
            background: activeEvent.joined ? "#E6F7E1" : "#FFF3D6",
            border: "3px solid #4A4238", borderRadius: 16,
            padding: "10px 12px", marginBottom: 10, boxShadow: "0 4px 0 #4A4238",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span className={activeEvent.joined ? "" : "tomo-alert"} style={{ fontSize: 30 }}>
                {activeEvent.emoji}
              </span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 900 }}>{activeEvent.name}</div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#8A7E6E" }}>
                  {activeEvent.joined
                    ? `✅ さんか した！ ${activeEvent.msg}`
                    : `いま かいさいちゅう！ ごきげん+${activeEvent.happy}`}
                </div>
              </div>
              {!activeEvent.joined && (
                <ChunkyButton small color="#FFD666" onClick={joinEvent}>
                  🎉 さんかする
                </ChunkyButton>
              )}
            </div>
          </div>
        )}

        {/* ★ つぎの おみせ ★ */}
        {view === "island" && nextBuilding && (
          <div style={{
            background: "#FFF3D6", border: "3px solid #4A4238", borderRadius: 14,
            padding: "6px 12px", marginBottom: 10, fontSize: 12, fontWeight: 800,
            textAlign: "center", boxShadow: "0 3px 0 #4A4238",
          }}>
            🔒 じゅうみんが あと <span style={{ fontSize: 15, color: "#E86AA6" }}>{nextBuilding.unlockAt - residents.length}</span> にん ふえると
            「{nextBuilding.emoji} {nextBuilding.label}」が できるよ！
          </div>
        )}

        {/* しま */}
        {view === "island" && (
          <IslandView
            residents={residents}
            onSelect={(id) => { setSelectedId(id); setPicker(null); setBubble(null); }}
            onAdd={() => setCreating(true)}
            onBuilding={(id) => setBuilding(id)}
            workReady={workReady}
            objects={objects}
            editMode={editMode}
            onPlaceObject={placeObject}
            onRemoveObject={removeObject}
            onLocked={(b) => showToast(`🔒 じゅうみんが ${b.unlockAt}にんに なると できるよ！`)}
            season={season}
            visitor={visitor}
            onVisitor={() => setBuilding("visitor")}
            onHouse={(spot) => setHouseSpot(spot)}
          />
        )}

        {/* マンション */}
        {view === "home" && (
        <div style={{
          background: "#F7B267",
          border: "4px solid #4A4238",
          borderRadius: "24px 24px 12px 12px",
          padding: "14px 12px 18px",
          boxShadow: "0 6px 0 #4A4238",
          position: "relative",
        }}>
          {/* 屋根 */}
          <div style={{ textAlign: "center", fontWeight: 900, fontSize: 13, background: "#FFFDF5", border: "3px solid #4A4238", borderRadius: 14, padding: "4px 10px", width: "fit-content", margin: "0 auto 12px" }}>
            🏠 なかよしマンション（{residents.length}/{MAX_RESIDENTS}にん）
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
            {Array.from({ length: MAX_RESIDENTS }).map((_, i) => {
              const r = residents[i];
              if (!r) {
                return (
                  <button
                    key={`empty-${i}`}
                    onClick={() => setCreating(true)}
                    style={{
                      aspectRatio: "1",
                      borderRadius: 16,
                      border: "3px dashed #8A6A3F",
                      background: "rgba(255,253,245,0.5)",
                      fontSize: 26,
                      color: "#8A6A3F",
                      cursor: "pointer",
                      fontFamily: "inherit",
                    }}
                    aria-label="あたらしい じゅうみんを つくる"
                  >
                    ＋
                  </button>
                );
              }
              return (
                <button
                  key={r.id}
                  onClick={() => { setSelectedId(r.id); setPicker(null); setBubble(null); }}
                  style={{
                    aspectRatio: "1",
                    borderRadius: 16,
                    border: "3px solid #4A4238",
                    background: WINDOW_COLORS[r.windowColor],
                    cursor: "pointer",
                    position: "relative",
                    padding: 4,
                    display: "flex",
                    flexDirection: "column",
                    alignItems: "center",
                    justifyContent: "center",
                    fontFamily: "inherit",
                  }}
                >
                  {r.problem && (
                    <span className="tomo-alert" style={{
                      position: "absolute", top: -8, right: -6,
                      background: "#FF6B6B", color: "#fff", fontWeight: 900,
                      borderRadius: "50%", width: 24, height: 24, lineHeight: "21px",
                      border: "2.5px solid #4A4238", fontSize: 14, zIndex: 2,
                    }}>！</span>
                  )}
                  <Avatar av={r.avatar} size={r.isBaby ? 40 : 54} bounce />
                  <div style={{
                    fontSize: 11, fontWeight: 800, background: "#FFFDF5",
                    border: "2px solid #4A4238", borderRadius: 8, padding: "0 6px",
                    marginTop: 2, maxWidth: "100%", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                  }}>
                    {r.isBaby ? "👶" : ""}{r.married ? "💍" : (r.partnerId ? "💞" : "")}{r.name}
                  </div>
                </button>
              );
            })}
          </div>
        </div>
        )}

        {/* しまニュース */}
        <div style={{
          marginTop: 16, background: "#FFFDF5", border: "3px solid #4A4238",
          borderRadius: 18, padding: "10px 14px", boxShadow: "0 4px 0 #4A4238",
        }}>
          <div style={{ fontWeight: 900, fontSize: 14, marginBottom: 6 }}>📰 しまニュース</div>
          {log.length === 0 ? (
            <div style={{ fontSize: 13, color: "#8A7E6E" }}>
              まだ ニュースは ないよ。「＋」から じゅうみんを つくってみよう！
            </div>
          ) : (
            <div style={{ maxHeight: 130, overflowY: "auto" }}>
              {log.map((e, i) => (
                <div key={e.t + "-" + i} style={{ fontSize: 13, padding: "3px 0", borderBottom: i < log.length - 1 ? "1px dashed #E0D6C6" : "none" }}>
                  {e.text}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* ★★ しゃしんアルバム ★★ */}
        {photos.length > 0 && (
          <div style={{
            marginTop: 12, background: "#FFFDF5", border: "3px solid #4A4238",
            borderRadius: 18, padding: "10px 14px", boxShadow: "0 4px 0 #4A4238",
          }}>
            <div style={{ fontWeight: 900, fontSize: 14, marginBottom: 8 }}>
              📷 しゃしんアルバム（{photos.length}まい）
            </div>
            <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }}>
              {photos.map((ph) => (
                <div key={ph.id} style={{
                  flexShrink: 0, width: 108, background: "#fff",
                  border: "3px solid #4A4238", borderRadius: 10, padding: 5,
                  boxShadow: "0 3px 0 rgba(74,66,56,0.4)",
                }}>
                  <div style={{
                    background: "#DCEBF8", borderRadius: 6, height: 52,
                    display: "flex", alignItems: "flex-end", justifyContent: "center",
                    overflow: "hidden", position: "relative",
                  }}>
                    <span style={{ position: "absolute", top: 2, left: 4, fontSize: 14 }}>{ph.emoji}</span>
                    <div style={{ display: "flex", gap: -4 }}>
                      {ph.members.slice(0, 4).map((av, i) => (
                        <Avatar key={i} av={av} size={22} shadow={false} />
                      ))}
                    </div>
                  </div>
                  <div style={{ fontSize: 8.5, fontWeight: 800, marginTop: 3, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {ph.name}
                  </div>
                  <div style={{ fontSize: 8, color: "#8A7E6E" }}>{ph.seasonEmoji}{ph.season}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{ textAlign: "center", fontSize: 11, color: "#5E7250", marginTop: 12 }}>
          💗 なかよし度70で こくはく → 💒けっこん → 👶あかちゃん → ⛴️たびだち！<br />
          しまは ひろいよ。ゆびで うごかして たんけんしてね 🏝️
        </div>
      </main>

      {/* トースト */}
      {toast && (
        <div className="tomo-pop" style={{
          position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
          background: "#4A4238", color: "#FFFDF5", fontWeight: 800, fontSize: 14,
          padding: "10px 18px", borderRadius: 20, zIndex: 100, maxWidth: "88%", textAlign: "center",
        }}>
          {toast}
        </div>
      )}

      {/* ===== 住民モーダル ===== */}
      {selected && (
        <Modal onClose={() => { setSelectedId(null); setPicker(null); setBubble(null); }}>
          <ResidentRoom
            r={selected}
            bubble={bubble && bubble.id === selected.id ? bubble.text : null}
            friends={friendsOf(selected.id)}
            picker={picker}
            setPicker={setPicker}
            coins={coins}
            onFeed={feed}
            onGift={giveGift}
            onTalk={talk}
            onSing={sing}
            onIntroduce={introduce}
            onConfess={confess}
            residents={residents}
            relations={relations}
          />
        </Modal>
      )}

      {/* ===== 作成モーダル ===== */}
      {creating && (
        <Modal onClose={() => setCreating(false)}>
          <CreateForm
            onCancel={() => setCreating(false)}
            onCreate={(nr) => {
              if (residents.length >= MAX_RESIDENTS) {
                showToast(`もう ${MAX_RESIDENTS}にん いっぱい！ たびに おくりだそう ⛴️`);
                setCreating(false);
                return;
              }
              setResidents((rs) => [...rs, { ...nr, homeSpot: rs.length % HOME_SPOTS.length }]);
              addLog(`🌟 ${nr.name}が しまに ひっこして きた！`);
              showToast(`${nr.name}が なかまに くわわった！`);
              setCreating(false);
            }}
          />
        </Modal>
      )}

      {/* ===== ★ いえの なか（かぞく）★ ===== */}
      {houseSpot !== null && (
        <Modal onClose={() => setHouseSpot(null)}>
          <div style={{ padding: "18px 18px 20px" }}>
            <div style={{ fontSize: 18, fontWeight: 900, marginBottom: 4 }}>🏠 かぞくの いえ</div>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#8A7E6E", marginBottom: 12 }}>
              いっしょに すんでいる ひとたち
            </div>
            {residents
              .filter((r) => (r.homeSpot ?? 0) === houseSpot)
              .map((r) => {
                const st = stageOf(r.age ?? 22);
                return (
                  <button
                    key={r.id}
                    onClick={() => { setHouseSpot(null); setSelectedId(r.id); setPicker(null); setBubble(null); }}
                    style={{
                      display: "flex", alignItems: "center", gap: 10, padding: "8px 10px",
                      background: "#F6EFE3", borderRadius: 14, marginBottom: 6,
                      border: "2px solid #E0D6C6", width: "100%", cursor: "pointer",
                      fontFamily: "inherit", textAlign: "left",
                    }}
                  >
                    <Avatar av={r.avatar} size={40} bounce />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 900, fontSize: 14 }}>
                        {r.married ? "💍" : (r.partnerId ? "💞" : "")}{r.name}
                      </div>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#8A7E6E" }}>
                        {st.emoji} {st.label} ／ {Math.floor(r.age ?? 22)}さい
                      </div>
                    </div>
                    {r.problem && <span className="tomo-alert" style={{ fontSize: 16 }}>❗</span>}
                  </button>
                );
              })}
          </div>
        </Modal>
      )}

      {/* ===== ★ たびびと ★ ===== */}
      {building === "visitor" && visitor && (
        <Modal onClose={() => setBuilding(null)}>
          <div style={{ padding: "18px 18px 20px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>

                background: "#FFF6C9", border: "3px solid #F5C542",

              }}>

              </div>
              <div>
                <div style={{ fontSize: 19, fontWeight: 900 }}>{visitor.name}</div>
                <div style={{ fontSize: 12, fontWeight: 800, color: "#8A6D00" }}>
                  {visitor.emoji} {visitor.label}
                </div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#8A7E6E", marginTop: 3 }}>
                  あと {visitor.ticksLeft} かいぶん しまに いるよ
                </div>
              </div>
            </div>

            <div style={{
              background: "#FFF3D6", border: "3px solid #4A4238", borderRadius: 16,
              padding: "10px 14px", fontSize: 14, fontWeight: 700, marginBottom: 12,
            }}>
              💬 「{visitor.line}」
            </div>

            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>
              <ChunkyButton color="#9BE3B0" onClick={visitorTalk}>💬 はなす</ChunkyButton>
              <ChunkyButton
                color="#FFD666"
                disabled={visitor.gaveGift}
                onClick={visitorGift}
              >
                {visitor.gaveGift ? "🎁 もらったよ！" : `🎁 おみやげを もらう（+${visitor.gift}🪙）`}
              </ChunkyButton>
              <ChunkyButton
                color="#FFB3C6"
                disabled={coins < 50 || residents.length >= MAX_RESIDENTS}
                onClick={visitorMoveIn}
              >
                🏠 しまに すんでもらう（🪙50）
              </ChunkyButton>
            </div>
          </div>
        </Modal>
      )}

      {/* ===== 建物モーダル ===== */}
      {building && building !== "visitor" && (
        <Modal onClose={() => setBuilding(null)}>
          <BuildingPanel
            building={building}
            residents={residents}
            coins={coins}
            workReady={workReady}
            onWork={workAtShop}
            onCafe={cafeRest}
            onLibrary={libraryStudy}
            onParty={plazaParty}
            onConcert={concert}
            onIce={giveIce}
            onMarry={marry}
            onTravel={travel}
            onEnroll={enroll}
            cardOut={cardOut}
            cardIn={cardIn}
            setCardIn={setCardIn}
            onMakeCard={makeCard}
            onCopyCard={copyCard}
            onReceiveCard={receiveCard}
            onPasteCard={pasteCard}
            cardErr={cardErr}
            onExportIsland={exportIsland}
            onImportIsland={importIsland}
            relations={relations}
            travelers={travelers}
            onOpenResident={(id) => { setBuilding(null); setSelectedId(id); setPicker(null); setBubble(null); }}
          />
        </Modal>
      )}
    </div>
  );
}

// ============ 住民のへや ============
function ResidentRoom({ r, bubble, friends, picker, setPicker, coins, onFeed, onGift, onTalk, onSing, onIntroduce, onConfess, residents, relations }) {
  const mood = moodOf(r);
  const p = PERSONALITIES.find((x) => x.id === r.personality);
  const partner = r.partnerId ? residents.find((x) => x.id === r.partnerId) : null;
  const parentNames = r.parents
    ? r.parents.map((pid) => (residents.find((x) => x.id === pid) || {}).name).filter(Boolean).join(" と ")
    : "";
  const favFood = FOODS.find((f) => f.id === r.favFood);
  const target = r.problem?.type === "friend" ? residents.find((x) => x.id === r.problem.targetId) : null;

  return (
    <div style={{ padding: "18px 18px 20px" }}>
      {/* プロフィール */}
      <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
        <div style={{
          background: WINDOW_COLORS[r.windowColor], border: "3px solid #4A4238",
          borderRadius: 18, padding: 8, flexShrink: 0,
        }}>
          <Avatar av={r.avatar} size={84} bounce />
        </div>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontSize: 20, fontWeight: 900 }}>{r.name}</div>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#8A7E6E" }}>
            {p.emoji} {p.label}せいかく ／ Lv.{r.level}
          </div>
          <div style={{ fontSize: 12, fontWeight: 800, color: "#4A4238", marginTop: 2 }}>
            {stageOf(r.age ?? 22).emoji} {stageOf(r.age ?? 22).label} ／ {Math.floor(r.age ?? 22)}さい
          </div>
          {partner && (
            <div style={{ fontSize: 12, fontWeight: 800, color: "#E86AA6", marginTop: 2 }}>
              {r.married ? "💍 けっこん" : "💞 こいびと"}：{partner.name}
            </div>
          )}
          {r.parents && (
            <div style={{ fontSize: 11, fontWeight: 700, color: "#8A7E6E", marginTop: 1 }}>
              👪 {parentNames || "しまで うまれた こ"}
            </div>
          )}
          {r.fromOtherIsland && (
            <div style={{ fontSize: 11, fontWeight: 800, color: "#4A8BC4", marginTop: 1 }}>
              🌏 よその しまから きた こ
            </div>
          )}
          <div style={{ fontSize: 13, fontWeight: 800, marginTop: 4 }}>
            {mood.emoji} {mood.text}
          </div>
          {favFood && (
            <div style={{ fontSize: 11, color: "#8A7E6E", marginTop: 2 }}>
              だいこうぶつ：{r.favKnown ? `${favFood.emoji}${favFood.name}` : "？？？（ごはんで さがそう）"}
            </div>
          )}
        </div>
      </div>

      {/* ふきだし */}
      {bubble && (
        <div className="tomo-pop" style={{
          marginTop: 12, background: "#FFF3D6", border: "3px solid #4A4238",
          borderRadius: 16, padding: "10px 14px", fontSize: 14, fontWeight: 700, position: "relative",
        }}>
          💬 {bubble}
        </div>
      )}

      {/* おなやみ */}
      {r.problem && (
        <div style={{
          marginTop: 12, background: "#FFE2E8", border: "3px solid #4A4238",
          borderRadius: 16, padding: "10px 14px",
        }}>
          <div style={{ fontWeight: 900, fontSize: 13, marginBottom: 4 }}>❗ おなやみ</div>
          <div style={{ fontSize: 14, fontWeight: 700 }}>「{r.problem.text}」</div>
          <div style={{ marginTop: 8, fontSize: 12, color: "#8A6060" }}>
            {r.problem.type === "hungry" && "→ ごはんを あげよう！"}
            {r.problem.type === "gift" && "→ ほしがってる プレゼントを あげよう！"}
            {r.problem.type === "chat" && "→ 「はなす」で きいてあげよう！"}
            {r.problem.type === "friend" && target && (
              <ChunkyButton small color="#9BE3B0" onClick={onIntroduce} style={{ marginTop: 4 }}>
                🤝 {target.name}に しょうかいする
              </ChunkyButton>
            )}
          </div>
        </div>
      )}

      {/* ステータス */}
      <div style={{ marginTop: 14 }}>
        <Bar value={r.hunger} color="#F7B267" label="おなか" emoji="🍚" />
        <Bar value={r.happiness} color="#FF8FA3" label="ごきげん" emoji="💖" />
        <Bar value={(r.exp / (r.level * 40)) * 100} color="#8FC3F7" label={`つぎのレベルまで`} emoji="⭐" />
        {(r.age ?? 22) < 22 && (
          <Bar
            value={clamp(((r.age ?? 0) / 22) * 100, 0, 100)}
            color="#C7B8F5"
            label="おとなに なるまで"
            emoji="🌱"
          />
        )}
      </div>

      {/* アクション */}
      <div style={{ display: "flex", gap: 8, marginTop: 6, flexWrap: "wrap" }}>
        <ChunkyButton color="#FFD666" onClick={() => setPicker(picker === "food" ? null : "food")}>🍽️ ごはん</ChunkyButton>
        <ChunkyButton color="#FFB3C6" onClick={() => setPicker(picker === "gift" ? null : "gift")}>🎁 プレゼント</ChunkyButton>
        <ChunkyButton color="#9BE3B0" onClick={onTalk}>💬 はなす</ChunkyButton>
        <ChunkyButton color="#C7B8F5" onClick={onSing}>🎤 うたう</ChunkyButton>
      </div>

      {/* ピッカー */}
      {picker === "food" && (
        <ItemPicker items={FOODS} coins={coins} onPick={onFeed} note="おなかが みたされるよ" />
      )}
      {picker === "gift" && (
        <ItemPicker items={GIFTS} coins={coins} onPick={onGift} note="ごきげんが アップするよ" />
      )}

      {/* なかよしリスト */}
      <div style={{ marginTop: 16 }}>
        <div style={{ fontWeight: 900, fontSize: 14, marginBottom: 6 }}>👥 なかよしリスト</div>
        {friends.length === 0 ? (
          <div style={{ fontSize: 13, color: "#8A7E6E" }}>まだ ともだちが いないみたい…</div>
        ) : (
          friends.map(({ r: f, v }) => {
            const isPartner = r.partnerId === f.id;
            const rl = relationLabel(v, isPartner && r.married);
            // こくはく できる じょうけん：しんゆう(70)いじょう／どちらも フリー／あかちゃんは だめ
            const canConfess =
              v >= 70 && !r.partnerId && !f.partnerId && !r.isBaby && !f.isBaby;
            return (
              <div key={f.id} style={{
                display: "flex", alignItems: "center", gap: 8, padding: "5px 8px",
                background: isPartner ? "#FFE2E8" : "#F6EFE3", borderRadius: 12, marginBottom: 5,
                border: isPartner ? "2px solid #E86AA6" : "2px solid #E0D6C6",
                flexWrap: "wrap",
              }}>
                <Avatar av={f.avatar} size={30} />
                <span style={{ fontWeight: 800, fontSize: 13, flex: 1 }}>{f.name}</span>
                <span style={{ fontSize: 12, fontWeight: 700 }}>{rl.emoji} {rl.label}（{v}）</span>
                {canConfess && (
                  <ChunkyButton small color="#FFB3C6" onClick={() => onConfess(f.id)} style={{ width: "100%", marginTop: 4 }}>
                    💗 {f.name}に こくはく する！（せいこうりつ {v}%）
                  </ChunkyButton>
                )}
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

function ItemPicker({ items, coins, onPick, note }) {
  return (
    <div className="tomo-pop" style={{
      marginTop: 10, background: "#F6EFE3", border: "3px solid #4A4238",
      borderRadius: 16, padding: 10,
    }}>
      <div style={{ fontSize: 11, color: "#8A7E6E", marginBottom: 6 }}>{note}</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
        {items.map((it) => (
          <button
            key={it.id}
            onClick={() => onPick(it)}
            disabled={coins < it.price}
            style={{
              fontFamily: "inherit", border: "3px solid #4A4238", borderRadius: 14,
              background: coins < it.price ? "#DDD5C8" : "#FFFDF5",
              padding: "8px 4px", cursor: coins < it.price ? "default" : "pointer",
              opacity: coins < it.price ? 0.55 : 1,
            }}
          >
            <div style={{ fontSize: 24 }}>{it.emoji}</div>
            <div style={{ fontSize: 11, fontWeight: 800 }}>{it.name}</div>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#8A7E6E" }}>🪙{it.price}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ============ しまマップ ============
const ACTIVITIES = [
  "さんぽ ちゅう🚶", "おひるね ちゅう💤", "うみを ながめてる🌊", "おはなを つんでる🌼",
  "ダンスの れんしゅう💃", "むしとり ちゅう🦋", "たいそう ちゅう🤸", "うたを うたってる🎵",
  "かいがらを さがしてる🐚", "ひなたぼっこ ちゅう☀️",
];

function IslandView({ residents, onSelect, onAdd, onBuilding, workReady, objects, editMode, onPlaceObject, onRemoveObject, onLocked, season, visitor, onVisitor, onHouse }) {
  const [pos, setPos] = useState({});
  const [act, setAct] = useState({});
  const [talker, setTalker] = useState(null);

  // じゅうみんは しまの まんなかへんを おさんぽする
  const randPos = () => ({ x: 26 + Math.random() * 48, y: 26 + Math.random() * 48 });

  useEffect(() => {
    setPos((p) => {
      const n = { ...p };
      residents.forEach((r) => { if (!n[r.id]) n[r.id] = randPos(); });
      return n;
    });
    setAct((a) => {
      const n = { ...a };
      residents.forEach((r) => { if (!n[r.id]) n[r.id] = pick(ACTIVITIES); });
      return n;
    });
  }, [residents]);

  useEffect(() => {
    const iv = setInterval(() => {
      setPos((p) => {
        const n = { ...p };
        residents.forEach((r) => { if (Math.random() < 0.6) n[r.id] = randPos(); });
        return n;
      });
      setAct((a) => {
        const n = { ...a };
        residents.forEach((r) => { if (Math.random() < 0.35) n[r.id] = pick(ACTIVITIES); });
        return n;
      });
      setTalker(residents.length > 0 && Math.random() < 0.75 ? pick(residents).id : null);
    }, 5000);
    return () => clearInterval(iv);
  }, [residents]);

  const handleIslandClick = (e) => {
    if (!editMode) return;
    const box = e.currentTarget.getBoundingClientRect();
    const x = ((e.clientX - box.left) / box.width) * 100;
    const y = ((e.clientY - box.top) / box.height) * 100;
    onPlaceObject(clamp(x, 2, 98), clamp(y, 2, 98));
  };

  // ★ はじめは しまの まんなかを うつす ★
  const scrollRef = useRef(null);
  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    el.scrollLeft = (el.scrollWidth - el.clientWidth) / 2;
    el.scrollTop = (el.scrollHeight - el.clientHeight) / 2;
  }, []);

  return (
    <div
      ref={scrollRef}
      style={{
        borderRadius: 24,
        border: editMode ? "4px dashed #C7B8F5" : "4px solid #4A4238",
        boxShadow: "0 6px 0 #4A4238",
        overflow: "auto",
        WebkitOverflowScrolling: "touch",
        background: "#4FA8D8",
        height: "min(70vh, 460px)",
        position: "relative",
      }}
    >
    <div
      onClick={handleIslandClick}
      style={{
        position: "relative",
        width: "300%",      // ★ よこ3ばい
        paddingTop: "300%", // ★ たて3ばい（＝ひろさ 9ばい！）
        background: `linear-gradient(180deg, ${season.sky} 0%, #4FA8D8 100%)`,
        cursor: editMode ? "crosshair" : "default",
      }}
    >
    <div style={{ position: "absolute", inset: 0 }}>
      {/* うみのかざり */}
      <span style={{ position: "absolute", left: "4%", top: "5%", fontSize: 16, opacity: 0.8 }}>🌊</span>
      <span style={{ position: "absolute", right: "5%", top: "10%", fontSize: 16, opacity: 0.8 }}>🌊</span>
      <span style={{ position: "absolute", right: "6%", bottom: "4%", fontSize: 20 }}>⛵</span>
      <span style={{ position: "absolute", left: "5%", bottom: "8%", fontSize: 14, opacity: 0.8 }}>🐟</span>

      {/* しま本体 */}
      <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }}>
        <defs>
          <radialGradient id="islandLight" cx="38%" cy="32%" r="70%">
            <stop offset="0%" stopColor="#ffffff" stopOpacity="0.35" />
            <stop offset="100%" stopColor="#000000" stopOpacity="0.16" />
          </radialGradient>
        </defs>
        {/* うみの かげ（りったいかん） */}
        <ellipse cx="50" cy="53" rx="49" ry="48" fill="rgba(20,60,90,0.35)" />
        {/* すなはま */}
        <ellipse cx="50" cy="50" rx="48" ry="47" fill="#F2D8A0" />
        {/* しばふ（きせつで いろが かわる） */}

            width: 44, height: 58, background: "#E4425A",

            display: "flex", alignItems: "flex-start", justifyContent: "center",

            <div style={{ width: 26, height: 6, background: "#4A4238", borderRadius: 3, marginTop: 12 }} />
          </div>

          <span style={{ position: "absolute", bottom: 12, right: 12, fontSize: 22 }}>🕊️</span>

      )}

      {/* いま なかに いる じゅうみん */}
      <div style={{
        position: "absolute", bottom: 4, left: 10,
        display: "flex", alignItems: "flex-end", gap: 2, zIndex: 2,
      }}>
        {visitors.map((r) => (
          <Avatar key={r.id} av={r.avatar} size={34} bounce />
        ))}

      {/* いらっしゃいませ */}
      <div style={{
        position: "absolute", top: 6, left: "50%", transform: "translateX(-50%)",
        background: "rgba(255,253,245,0.92)", border: "2px solid #4A4238", borderRadius: 10,
        padding: "1px 8px", fontSize: 10, fontWeight: 900, whiteSpace: "nowrap", zIndex: 3,
      }}>
        {it.welcome}
      </div>
    </div>
  );
}

function BuildingPanel({ building, residents, relations, travelers, coins, workReady, onWork, onCafe, onLibrary, onParty, onConcert, onIce, onMarry, onTravel, onEnroll, cardOut, cardIn, setCardIn, onMakeCard, onCopyCard, onReceiveCard, onPasteCard, cardErr, onExportIsland, onImportIsland, onOpenResident }) {
  const b = BUILDINGS.find((x) => x.id === building);

          {b.emoji}

          <div style={{ fontSize: 18, fontWeight: 900 }}>{b.label}</div>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#8A7E6E" }}>
            なかに はいった！
          </div>
        </div>
      </div>

      {/* ★ おみせの なか ★ */}
      <InteriorRoom building={building} visitors={visitors} />

      {/* ショップ */}
      {building === "shop" && (
        <>
          <p style={{ fontSize: 14, fontWeight: 700, lineHeight: 1.7, margin: "0 0 12px" }}>

            <span style={{ fontSize: 12, color: "#8A7E6E", display: "block", marginTop: 2 }}>
              ※ かせいだら すこし じかんを おくと また はたらけるよ
            </span>
          </p>
          <div style={{ textAlign: "center" }}>
            <ChunkyButton color={workReady ? "#FFD666" : "#DDD5C8"} disabled={!workReady} onClick={onWork}>
              {workReady ? "🧹 アルバイトする（+12〜25🪙）" : "😴 やすみちゅう…（もうすこし まってね）"}
            </ChunkyButton>
          </div>
        </>

      {/* カフェ */}
      {building === "cafe" && (
        <FacilityPick
          note="じゅうみんを えらんで ひとやすみ（🪙20）→ ごきげん+25・おなか+10"

          coins={coins}
          cost={20}
          onPick={onCafe}

          coins={coins}
          cost={15}
          onPick={onLibrary}
          actionLabel="📖 べんきょうさせる"
        />

      {/* 広場 */}
      {building === "plaza" && (
        <>
          <p style={{ fontSize: 14, fontWeight: 700, lineHeight: 1.7, margin: "0 0 12px" }}>
            みんなで あつまって パーティー！<br />
            ぜんいんの ごきげんが あがって、なかよし度も アップするよ。
          </p>
          <div style={{ textAlign: "center" }}>
            <ChunkyButton color="#9BE3B0" onClick={onParty}>

          </div>

      {/* ★ ライブステージ ★ */}

            みんなの こえが きこえるよ 🎵<br />

        const seen = new Set();
        const couples = [];
        residents.forEach((r) => {
          if (!r.partnerId || r.married || seen.has(r.id)) return;
          const pt = residents.find((x) => x.id === r.partnerId);
          if (!pt || pt.married || seen.has(pt.id)) return;
          seen.add(r.id); seen.add(pt.id);
          couples.push([r, pt]);
        });
        // けっこんずみ ふうふ
        const seen2 = new Set();
        const marrieds = [];
        residents.forEach((r) => {
          if (!r.married || !r.partnerId || seen2.has(r.id)) return;
          const pt = residents.find((x) => x.id === r.partnerId);
          if (!pt || seen2.has(pt.id)) return;
          seen2.add(r.id); seen2.add(pt.id);
          marrieds.push([r, pt]);

        return (
          <>
            <p style={{ fontSize: 13, fontWeight: 700, lineHeight: 1.6, margin: "0 0 12px", color: "#6B5F50" }}>

                  <ChunkyButton color="#FFB3C6" disabled={coins < 100} onClick={() => onMarry(a.id, b.id)}>

        const ready = residents.filter((r) => r.parents && (r.age ?? 22) >= 18);
        const growing = residents.filter((r) => r.parents && (r.age ?? 22) < 18);

        return (
          <>
            <p style={{ fontSize: 13, fontWeight: 700, lineHeight: 1.6, margin: "0 0 12px", color: "#6B5F50" }}>
              しまで うまれた こは、<b>18さい</b>に なると たびに でられる。<br />
              たびに でた こからは、ときどき <b>てがみ 💌</b> が とどくよ。

            {ready.length === 0 && growing.length === 0 && travelers.length === 0 && (
              <div style={{ fontSize: 13, fontWeight: 700, color: "#8A7E6E", lineHeight: 1.7 }}>

              <div style={{ marginBottom: 12 }}>
                <div style={{ fontWeight: 900, fontSize: 13, marginBottom: 6 }}>🌱 せいちょうちゅう</div>
                {growing.map((r) => {
                  const st = stageOf(r.age ?? 0);
                  return (
                    <div key={r.id} style={{
                      display: "flex", alignItems: "center", gap: 8, padding: "6px 10px",
                      background: "#F6EFE3", borderRadius: 12, marginBottom: 5, border: "2px solid #E0D6C6",
                    }}>
                      <Avatar av={r.avatar} size={28} />
                      <span style={{ fontWeight: 800, fontSize: 13, flex: 1 }}>{r.name}</span>
                      <span style={{ fontSize: 11, fontWeight: 700, color: "#8A7E6E" }}>

                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                  <Avatar av={r.avatar} size={44} bounce />
                  <div>
                    <div style={{ fontWeight: 900, fontSize: 15 }}>{r.name}</div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#8A7E6E" }}>
                      {Math.floor(r.age)}さい ／ Lv.{r.level} ／ たびの じゅんび OK！

                  </div>
                </div>
                <div style={{ textAlign: "center" }}>
                  <ChunkyButton color="#8FC3F7" onClick={() => onTravel(r.id)}>

                    <span style={{ fontSize: 16 }}>💌</span>

        const canEnroll = residents.filter((r) => {
          const idx = stageIndexOf(r.age ?? 22);
          const st = LIFE_STAGES[idx];
          if (!st.school) return false;
          if ((r.schoolLevel ?? 0) >= idx) return false;
          return isUniv ? st.id === "univ" : st.id !== "univ";
        });
        const students = residents.filter((r) => {
          const idx = stageIndexOf(r.age ?? 22);
          return (r.schoolLevel ?? 0) >= idx && LIFE_STAGES[idx].school &&
                 (isUniv ? LIFE_STAGES[idx].id === "univ" : LIFE_STAGES[idx].id !== "univ");
        });

        return (
          <>
            <p style={{ fontSize: 13, fontWeight: 700, lineHeight: 1.6, margin: "0 0 10px", color: "#6B5F50" }}>

            </p>

            {/* ★ しんがくの みちのり ★ */}
            <div style={{
              display: "flex", alignItems: "center", justifyContent: "space-between",

              {LIFE_STAGES.filter((st) => st.school).map((st, i, arr) => (

                    <div style={{ fontSize: 16 }}>{st.emoji}</div>

            {canEnroll.map((r) => {
              const st = LIFE_STAGES[stageIndexOf(r.age ?? 22)];

                <div key={r.id} style={{

                    <ChunkyButton color="#FFD666" disabled={coins < 30} onClick={() => onEnroll(r.id)}>

            {students.length > 0 && (

                <div style={{ fontWeight: 900, fontSize: 13, marginBottom: 6 }}>📖 かよってる こ</div>

      {/* ★ しまホテル ★ */}

      {building === "museum" && (
        <FacilityPick
          note="びじゅつひんを かんしょう（🪙15）→ けいけんち+30（あたまが よくなる）"

          coins={coins}
          cost={15}
          onPick={onLibrary}
          actionLabel="🖼️ かんしょうさせる"
        />

      {/* ★★ こうかんポスト（よその しまと じゅうみんを やりとり）★★ */}

            background: "#FFF3D6", border: "3px solid #4A4238", borderRadius: 16,
            padding: 12, marginBottom: 12,

            <div style={{ fontWeight: 900, fontSize: 14, marginBottom: 8 }}>

              </div>
            )}

            {cardOut && (
              <div className="tomo-pop">
                <div style={{ fontSize: 11, fontWeight: 800, marginBottom: 4, color: "#8A6D00" }}>
                  ↓ この もじを ぜんぶ コピーして おくってね
                </div>
                <textarea
                  id="cardOutArea"
                  readOnly
                  value={cardOut}
                  onFocus={(e) => e.target.select()}
                  style={{
                    width: "100%", height: 64, fontFamily: "monospace", fontSize: 10,
                    border: "3px solid #4A4238", borderRadius: 12, padding: 8,
                    background: "#FFFDF5", color: "#4A4238", resize: "none",
                  }}
                />
                <div style={{ textAlign: "center", marginTop: 6 }}>
                  <ChunkyButton small color="#9BE3B0" onClick={onCopyCard}>
                    📋 コピーする
                  </ChunkyButton>
                </div>
                <div style={{ fontSize: 10, color: "#8A7E6E", marginTop: 6, textAlign: "center" }}>
                  ※ カードに しても、この こは しまから いなくならないよ 😊
                </div>
              </div>
            )}
          </div>

          {/* --- うけとる --- */}
          <div style={{
            background: "#E0F3FF", border: "3px solid #4A4238", borderRadius: 16, padding: 12,
          }}>
            <div style={{ fontWeight: 900, fontSize: 14, marginBottom: 8 }}>
              📥 カードを うけとる
            </div>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#4A6B80", marginBottom: 6 }}>
              もらった もじを ここに はりつけて（Ctrl+V）ボタンを おそう！
            </div>
            <textarea
              value={cardIn}
              onChange={(e) => setCardIn(e.target.value)}
              placeholder="TOMO1:...... を ここに はりつける"
              style={{
                width: "100%", height: 64, fontFamily: "monospace", fontSize: 10,
                border: "3px solid #4A4238", borderRadius: 12, padding: 8,
                background: "#FFFDF5", color: "#4A4238", resize: "none",
              }}
            />
            <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 8, flexWrap: "wrap" }}>
              <ChunkyButton small color="#FFFDF5" onClick={onPasteCard}>
                📋 はりつける
              </ChunkyButton>
              <ChunkyButton
                color="#8FC3F7"
                disabled={residents.length >= MAX_RESIDENTS}
                onClick={onReceiveCard}
              >
                {residents.length >= MAX_RESIDENTS
                  ? "いえが いっぱい！"
                  : "🌏 しまに よんでくる！"}
              </ChunkyButton>
            </div>

            {/* ★ エラーの ないよう ★ */}
            {cardErr && (
              <div className="tomo-pop" style={{
                marginTop: 10, background: "#FFE2E8", border: "3px solid #E4425A",
                borderRadius: 12, padding: 10,
              }}>
                <div style={{ fontSize: 12, fontWeight: 900, color: "#A81E38", marginBottom: 4 }}>
                  ❌ よみこめなかった
                </div>
                <pre style={{
                  margin: 0, fontSize: 10, fontFamily: "monospace",
                  whiteSpace: "pre-wrap", wordBreak: "break-all", color: "#7A2030",
                }}>
                  {cardErr}
                </pre>
                <div style={{ fontSize: 10, color: "#7A2030", marginTop: 6, lineHeight: 1.6 }}>
                  💡 「TOMO1:」から さいごまで、<b>ぜんぶ</b> コピーできてるか みてね
                </div>
              </div>
            )}
          </div>

          {/* --- ★ しまごと バックアップ ★ --- */}
          <div style={{
            background: "#E6F7E1", border: "3px solid #4A4238", borderRadius: 16,
            padding: 12, marginTop: 12,
          }}>
            <div style={{ fontWeight: 900, fontSize: 14, marginBottom: 6 }}>
              🗂️ しまの バックアップ
            </div>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#4A6B50", marginBottom: 10, lineHeight: 1.6 }}>
              しま <b>ぜんぶ</b>（じゅうみん・いえ・しゃしん・コイン）を ファイルに ほぞんできるよ。<br />
              ときどき やっておくと、まんがいち きえても もどせる！<br />
              べつの パソコンや タブレットに ひっこす ときにも つかえる 📱💻
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap" }}>
              <ChunkyButton small color="#9BE3B0" onClick={onExportIsland}>
                💾 バックアップを ほぞん
              </ChunkyButton>
              <label style={{
                fontFamily: "inherit", fontWeight: 800, fontSize: 13,
                padding: "7px 12px", borderRadius: 16,
                border: "3px solid #4A4238", background: "#FFFDF5",
                color: "#4A4238", cursor: "pointer", boxShadow: "0 3px 0 #4A4238",
                display: "inline-block",
              }}>
                📂 バックアップから もどす
                <input
                  type="file"
                  accept="application/json,.json"
                  style={{ display: "none" }}
                  onChange={(e) => { onImportIsland(e.target.files && e.target.files[0]); e.target.value = ""; }}
                />
              </label>
            </div>
          </div>
        </>
      )}

      {/* ★ アイスやさん ★ */}
      {building === "ice" && (
        <>
          <p style={{ fontSize: 14, fontWeight: 700, lineHeight: 1.7, margin: "0 0 12px" }}>
            つめたい アイスで みんな にっこり！<br />
            <span style={{ fontSize: 12, color: "#8A7E6E" }}>
              ※ ぜんいん ごきげん+12・おなか+8
            </span>
          </p>
          <div style={{ textAlign: "center" }}>
            <ChunkyButton color="#7FD8C8" onClick={onIce}>
              🍦 みんなに アイスを くばる（🪙15）
            </ChunkyButton>
          </div>
        </>
      )}
    </div>
  );
}

function FacilityPick({ note, residents, coins, cost, onPick, actionLabel }) {
  if (residents.length === 0) {
    return <p style={{ fontSize: 14, fontWeight: 700, color: "#8A7E6E" }}>まだ じゅうみんが いないよ！</p>;
  }
  return (
    <>
      <p style={{ fontSize: 13, fontWeight: 700, lineHeight: 1.6, margin: "0 0 12px", color: "#6B5F50" }}>{note}</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {residents.map((r) => (
          <div key={r.id} style={{
            display: "flex", alignItems: "center", gap: 10, padding: "6px 10px",
            background: "#F6EFE3", borderRadius: 14, border: "2px solid #E0D6C6",
          }}>
            <Avatar av={r.avatar} size={34} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 800, fontSize: 14 }}>{r.name}</div>
              <div style={{ fontSize: 11, color: "#8A7E6E" }}>Lv.{r.level}</div>
            </div>
            <ChunkyButton small color="#FFD666" disabled={coins < cost} onClick={() => onPick(r.id)}>
              {actionLabel}
            </ChunkyButton>
          </div>
        ))}
      </div>
    </>
  );
}

// ============ 住民つくる ============
function CreateForm({ onCreate, onCancel }) {
  const [name, setName] = useState("");
  const [personality, setPersonality] = useState("genki");
  const [av, setAv] = useState(randomAvatar());
  const [voiceSeed, setVoiceSeed] = useState(rand(VOICE_TWEAKS.length));

  const tryVoice = () => {
    speakAs(
      { personality, voiceSeed, isBaby: false },
      `こんにちは！ ${name.trim() || "ぼく"} だよ！`
    );
  };

  const cycle = (key, max) => setAv((a) => ({ ...a, [key]: (a[key] + 1) % max }));

  const submit = () => {
    const nm = name.trim().slice(0, 8) || pick(NAME_POOL);
    onCreate({
      id: "r" + Date.now() + rand(999),
      name: nm,
      personality,
      avatar: av,
      hunger: 70,
      happiness: 60,
      level: 1,
      exp: 0,
      favFood: pick(FOODS).id,
      favKnown: false,
      windowColor: rand(WINDOW_COLORS.length),
      problem: null,
      voiceSeed: voiceSeed,          // ★ こえの こせい
      age: 22,                       // さいしょから おとな
      schoolLevel: 6,                // だいがくまで そつぎょうずみ
      partnerId: null,               // こいびと／けっこん あいて
      married: false,
      isBaby: false,
      growth: 100,                   // 100 = おとな
      parents: null,
      babyCooldown: 0,
    });
  };

  return (
    <div style={{ padding: "18px 18px 20px" }}>
      <div style={{ fontSize: 18, fontWeight: 900, marginBottom: 12 }}>🌟 あたらしい じゅうみん</div>

      {/* プレビュー */}
      <div style={{ display: "flex", justifyContent: "center", marginBottom: 10 }}>
        <div style={{ background: "#E0F3FF", border: "3px solid #4A4238", borderRadius: 20, padding: 12 }}>
          <Avatar av={av} size={110} bounce />
        </div>
      </div>

      {/* 見た目 */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center", marginBottom: 12 }}>
        <ChunkyButton small color="#FFFDF5" onClick={() => cycle("hairStyle", HAIR_STYLES)}>💇 かみがた</ChunkyButton>
        <ChunkyButton small color="#FFFDF5" onClick={() => cycle("bangs", BANG_STYLES)}>✂️ まえがみ</ChunkyButton>
        <ChunkyButton small color="#FFFDF5" onClick={() => cycle("hairColor", HAIR_COLORS.length)}>🎨 かみいろ</ChunkyButton>
        <ChunkyButton small color="#FFFDF5" onClick={() => cycle("skin", SKIN_COLORS.length)}>🖐️ はだいろ</ChunkyButton>
        <ChunkyButton small color="#FFFDF5" onClick={() => cycle("shirt", SHIRT_COLORS.length)}>👕 ふく</ChunkyButton>
        <ChunkyButton small color="#FFFDF5" onClick={() => cycle("eyes", EYE_STYLES)}>👀 め</ChunkyButton>
        <ChunkyButton small color="#FFFDF5" onClick={() => cycle("mouth", MOUTH_STYLES)}>👄 くち</ChunkyButton>
        <ChunkyButton small color="#C7B8F5" onClick={() => setAv(randomAvatar())}>🎲 ランダム</ChunkyButton>
      </div>

      {/* 名前 */}
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontWeight: 800, fontSize: 13, marginBottom: 4 }}>なまえ（8もじまで）</div>
        <div style={{ display: "flex", gap: 8 }}>
          <input
            value={name}
            onChange={(e) => setName(e.target.value.slice(0, 8))}
            placeholder="なまえを いれてね"
            style={{
              flex: 1, fontFamily: "inherit", fontWeight: 700, fontSize: 15,
              border: "3px solid #4A4238", borderRadius: 14, padding: "9px 12px",
              background: "#FFFDF5", color: "#4A4238",
            }}
          />
          <ChunkyButton small color="#FFFDF5" onClick={() => setName(pick(NAME_POOL))}>🎲</ChunkyButton>
        </div>
      </div>

      {/* せいかく */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontWeight: 800, fontSize: 13, marginBottom: 4 }}>せいかく</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {PERSONALITIES.map((p) => (
            <button
              key={p.id}
              onClick={() => setPersonality(p.id)}
              style={{
                fontFamily: "inherit", fontWeight: 800, fontSize: 13,
                padding: "7px 12px", borderRadius: 16,
                border: "3px solid #4A4238",
                background: personality === p.id ? "#FFD666" : "#FFFDF5",
                cursor: "pointer", color: "#4A4238",
                boxShadow: personality === p.id ? "0 3px 0 #4A4238" : "none",
              }}
            >
              {p.emoji} {p.label}
            </button>
          ))}
        </div>
      </div>

      {/* ★ こえ ★ */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontWeight: 800, fontSize: 13, marginBottom: 4 }}>
          こえ（{VOICE_TWEAKS[voiceSeed].name}）
        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
          <ChunkyButton small color="#FFFDF5" onClick={() => setVoiceSeed((v) => (v + 1) % VOICE_TWEAKS.length)}>
            🔀 こえを かえる
          </ChunkyButton>
          <ChunkyButton small color="#C7B8F5" onClick={tryVoice}>
            🔈 こえを きく
          </ChunkyButton>
        </div>
        <div style={{ display: "flex", gap: 3, marginTop: 6 }}>
          {VOICE_TWEAKS.map((_, i) => (
            <div key={i} style={{
              flex: 1, height: 7, borderRadius: 4,
              border: "2px solid #4A4238",
              background: i === voiceSeed ? "#C7B8F5" : "#F2EFE6",
            }} />
          ))}
        </div>
      </div>

      <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
        <ChunkyButton color="#EDE4D6" onClick={onCancel}>やめる</ChunkyButton>
        <ChunkyButton color="#9BE3B0" onClick={submit}>🏠 ひっこし させる！</ChunkyButton>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<TomodachiIsland />);
</script>

</body>
</html>
