<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!-- ★ けんさくよけ：Googleなどに のらない（URLを しってる ひとだけ）★ -->
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<title>ほしあつめゲーム</title>
<style>
  body {
    margin: 0;
    background: #101030;
    color: #fff;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    user-select: none;
  }
  h1 { font-size: 24px; margin: 10px; }
  #score { font-size: 28px; margin-bottom: 8px; }
  canvas {
    background: #1c1c4a;
    border: 4px solid #4444aa;
    border-radius: 12px;
  }
  p { font-size: 14px; color: #aaa; }
</style>
</head>
<body>

<h1>⭐ ほしあつめゲーム ⭐</h1>
<div id="score">スコア: 0</div>
<canvas id="game" width="480" height="360"></canvas>
<p>やじるしキー ← ↑ → ↓ で うごかそう！</p>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');

  // ▼ ここの すうじを かえると ゲームが かわるよ！
  const SPEED = 4;        // プレイヤーの はやさ
  const PLAYER_SIZE = 30; // プレイヤーの おおきさ
  const STAR_SIZE = 24;   // ほしの おおきさ

  let score = 0;
  const player = { x: 225, y: 165 };
  const star = { x: 100, y: 100 };
  const keys = {};

  document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key.startsWith('Arrow')) e.preventDefault();
  });
  document.addEventListener('keyup', e => { keys[e.key] = false; });

  function moveStar() {
    star.x = Math.random() * (canvas.width - STAR_SIZE);
    star.y = Math.random() * (canvas.height - STAR_SIZE);
  }

  function update() {
    if (keys['ArrowLeft'])  player.x -= SPEED;
    if (keys['ArrowRight']) player.x += SPEED;
    if (keys['ArrowUp'])    player.y -= SPEED;
    if (keys['ArrowDown'])  player.y += SPEED;

    // がめんの そとに でないように
    player.x = Math.max(0, Math.min(canvas.width  - PLAYER_SIZE, player.x));
    player.y = Math.max(0, Math.min(canvas.height - PLAYER_SIZE, player.y));

    // ほしに ぶつかったか？
    if (player.x < star.x + STAR_SIZE &&
        player.x + PLAYER_SIZE > star.x &&
        player.y < star.y + STAR_SIZE &&
        player.y + PLAYER_SIZE > star.y) {
      score++;
      scoreEl.textContent = 'スコア: ' + score;
      moveStar();
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // ほし
    ctx.font = STAR_SIZE + 'px sans-serif';
    ctx.fillText('⭐', star.x, star.y + STAR_SIZE);

    // プレイヤー
    ctx.font = PLAYER_SIZE + 'px sans-serif';
    ctx.fillText('🚀', player.x, player.y + PLAYER_SIZE);
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  moveStar();
  loop();
</script>

</body>
</html>
